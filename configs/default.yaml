# HM-STGN Default Hyperparameters
# All experiment configs override only the keys they change.

model:
  d_model: 64              # Shared embedding dimension across all modules
  dropout: 0.1

  patch_transformer:
    n_layers: 2
    n_heads: 4
    patch_size: 2          # 2 timesteps per patch → 6 patches from T=12
    feedforward_dim: 256

  gatv2:
    n_layers: 2
    n_heads: 4

  adaptive_graph:
    d_embed: 16
    alpha_init: 0.5        # Learnable blend: alpha*A_static + (1-alpha)*A_adaptive
    sigma_m: 5000          # Gaussian kernel bandwidth in metres for road-network distances

  context_encoder:
    hidden_dim: 128        # MLP: (T*K) → 128 → 64 → d_model

  prediction_heads:
    loss_weight_speed: 0.5
    loss_weight_congestion: 0.25
    loss_weight_anomaly: 0.25

data:
  T: 12                    # Input timesteps (60 min at 5-min resolution)
  H: 12                    # Max prediction horizon (60 min); eval at 3, 6, 12
  N: 50                    # Number of sensor nodes
  F: 3                     # Input features: speed, volume, occupancy
  eval_horizons: [3, 6, 12]  # 15 min, 30 min, 60 min

  splits:
    train_start: "2020-04-01"   # Jan-Mar 2020 excluded: sensors fully imputed (std=0.69)
    train_end:   "2021-03-31"
    val_start:   "2021-04-01"
    val_end:     "2021-06-30"
    test_start:  "2021-07-01"
    test_end:    "2021-09-30"   # Oct-Dec 2021 excluded: sensors fully imputed (std=0.69)

  missing_threshold: 0.50  # Drop sensors with >50% missing at 15-min resolution
  gap_fill_limit: 4        # Forward-fill up to 4 consecutive missing 15-min readings (1 hour)

training:
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 32
  max_epochs: 100
  early_stopping_patience: 10   # On val MAE
  grad_clip_norm: 5.0

  lr_scheduler:
    name: ReduceLROnPlateau
    factor: 0.5
    patience: 5

paths:
  raw_dir:       "data/raw"
  processed_dir: "data/processed"
  graph_dir:     "data/graph"
  checkpoint_dir: "checkpoints"
